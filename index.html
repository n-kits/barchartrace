<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Рейтинг Картографов</title>
    <!-- Подключение Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .bar-row {
            top: 0;
            transition: transform 0.8s cubic-bezier(0.33, 1, 0.68, 1), opacity 0.4s ease;
            will-change: transform, opacity;
        }

        /* Стили ползунка */
        input[type="range"] {
            -webkit-appearance: none;
            appearance: none;
            background: transparent;
            cursor: pointer;
            width: 100%;
        }

        input[type="range"]::-webkit-slider-runnable-track {
            background: #1e293b;
            height: 6px;
            border-radius: 3px;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            margin-top: -5px;
            background-color: #94a3b8;
            height: 16px;
            width: 16px;
            border-radius: 50%;
            transition: background-color 0.15s ease-in-out;
            box-shadow: 0 0 5px rgba(0, 0, 0, 0.5);
        }

        input[type="range"]::-webkit-slider-thumb:hover {
            background-color: #cbd5e1;
        }

        /* Анимация импульса медалей при смене месяца (Тач-эффект) */
        @keyframes medalPop {
            0% {
                transform: scale(1);
                filter: drop-shadow(0 0 0px rgba(251, 191, 36, 0));
            }

            35% {
                transform: scale(1.35);
                filter: drop-shadow(0 0 12px rgba(251, 191, 36, 0.7));
            }

            100% {
                transform: scale(1);
                filter: drop-shadow(0 0 0px rgba(251, 191, 36, 0));
            }
        }

        .animate-pop {
            animation: medalPop 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
    </style>
</head>

<body class="bg-[#060B14] text-slate-100 h-screen overflow-hidden flex flex-col font-sans select-none antialiased">

    <!-- Основной контейнер занимает всю высоту -->
    <main class="w-full max-w-[1600px] mx-auto p-4 md:p-6 flex flex-col h-full">

        <!-- Заголовок -->
        <header class="mb-4 flex-shrink-0 flex flex-col md:flex-row md:items-end justify-between gap-4">
            <div>
                <h1
                    class="text-2xl md:text-3xl font-black tracking-tight text-white bg-clip-text bg-gradient-to-r from-slate-100 to-slate-300 text-transparent">
                    Гонка Картографов
                </h1>
                <p id="date-range" class="text-slate-500 text-xs md:text-sm mt-1">Загрузка данных...</p>
            </div>
            <!-- Динамические кнопки годов -->
            <div id="year-filters" class="flex flex-wrap gap-2 text-sm font-semibold"></div>
        </header>

        <!-- Область графика -->
        <div class="relative bg-[#0C1424] rounded-xl p-4 md:p-6 flex-1 flex flex-col overflow-hidden shadow-2xl">

            <!-- Водяной знак -->
            <div
                class="absolute bottom-8 right-12 md:right-16 flex flex-col items-end z-0 select-none pointer-events-none opacity-20 whitespace-nowrap">
                <div id="watermark-date"
                    class="text-6xl md:text-8xl font-black text-slate-500 font-mono tracking-tighter leading-none">
                    --.--.----
                </div>
                <div class="text-4xl md:text-5xl font-bold text-slate-500 font-mono mt-2 pr-2">
                    Всего: <span id="watermark-total">0</span>
                </div>
            </div>

            <!-- Контейнер для строк рейтинга -->
            <div id="chart-container" class="relative w-full h-full z-10 mt-2">
                <div id="grid-lines"
                    class="absolute left-[160px] md:left-[220px] right-[70px] top-0 bottom-0 pointer-events-none select-none z-0">
                </div>
            </div>
        </div>

        <!-- Панель управления -->
        <footer class="mt-4 flex-shrink-0 bg-[#0C1424] rounded-xl p-3 flex flex-col gap-3 shadow-xl">
            <div class="flex items-center justify-between gap-4">
                <div class="flex items-center gap-3">
                    <button id="btn-play"
                        class="p-2 bg-slate-700 hover:bg-slate-600 rounded-lg text-white transition duration-150 shadow-md">
                        <svg id="icon-play" class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24">
                            <path d="M8 5v14l11-7z" />
                        </svg>
                        <svg id="icon-pause" class="w-6 h-6 hidden" fill="currentColor" viewBox="0 0 24 24">
                            <path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z" />
                        </svg>
                    </button>
                    <button id="btn-reset"
                        class="p-2 bg-slate-800/80 hover:bg-slate-700 rounded-lg text-slate-400 hover:text-slate-200 transition duration-150">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                            stroke-linecap="round" stroke-linejoin="round" class="w-5 h-5">
                            <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8" />
                            <path d="M3 3v5h5" />
                        </svg>
                    </button>

                    <div class="flex items-center bg-[#060B14] rounded-lg p-1 border border-slate-800/50 ml-2">
                        <span class="text-[10px] uppercase font-bold text-slate-500 px-2 tracking-wider">Скорость</span>
                        <div class="flex text-xs font-semibold">
                            <button class="speed-btn px-2 py-1 rounded" data-speed="0.5">0.5x</button>
                            <button class="speed-btn px-2 py-1 rounded bg-slate-700 text-white shadow"
                                data-speed="1">1x</button>
                            <button class="speed-btn px-2 py-1 rounded" data-speed="2.5">2.5x</button>
                            <button class="speed-btn px-2 py-1 rounded" data-speed="5">5x</button>
                            <button class="speed-btn px-2 py-1 rounded" data-speed="10">10x</button>
                        </div>
                    </div>
                </div>

                <div class="text-right whitespace-nowrap">
                    <div id="current-date" class="text-base font-bold font-mono text-slate-200 leading-tight">--.--.----
                    </div>
                    <div id="day-counter" class="text-[10px] text-slate-500 font-mono uppercase tracking-widest">День 0
                        / 0</div>
                </div>
            </div>

            <!-- Таймлайн -->
            <div class="relative w-full pt-1 pb-4">
                <input id="timeline-slider" type="range" min="0" max="1" step="0.01" value="0" class="relative z-10"
                    disabled>
                <div id="timeline-labels" class="absolute top-6 left-0 right-0 w-full h-4 pointer-events-none"></div>
            </div>
        </footer>
    </main>

    <script>
        // =========================================================================
        // НАСТРОЙКИ ОТОБРАЖЕНИЯ МЕДАЛЕЙ (Просто меняйте значения и сохраняйте файл!)
        // =========================================================================
        const MEDAL_CONFIG = {
            emojiSize: "text-[11px]",   // Размер эмодзи (классы Tailwind: text-[11px], text-[13px], text-xs, text-sm)
            digitSize: "text-[10px]",   // Размер шрифта цифры количества медалей
            gapBetween: "gap-1.5",      // Расстояние между медалями разных видов (gap-1 = 4px, gap-1.5 = 6px, gap-2 = 8px)
            gapInside: "gap-0.5",       // Расстояние между иконкой медали и ее цифрой (gap-0.5 = 2px, gap-1 = 4px)
            useXFormat: true,          // Формат вывода: true -> "x3" / false -> "3"
            order: "emoji-first"        // Порядок вывода: "emoji-first" -> 🥇3 / "digit-first" -> 3🥇
        };
        // =========================================================================

        const rowHeight = 52;
        const gap = 10;
        const TOP_LIMIT = 10;

        const chartContainer = document.getElementById('chart-container');
        const btnPlay = document.getElementById('btn-play');
        const iconPlay = document.getElementById('icon-play');
        const iconPause = document.getElementById('icon-pause');
        const btnReset = document.getElementById('btn-reset');
        const slider = document.getElementById('timeline-slider');
        const textCurrentDate = document.getElementById('current-date');
        const textDateRange = document.getElementById('date-range');
        const textWatermarkDate = document.getElementById('watermark-date');
        const textWatermarkTotal = document.getElementById('watermark-total');
        const textDayCounter = document.getElementById('day-counter');
        const speedButtons = document.querySelectorAll('.speed-btn');
        const yearFiltersContainer = document.getElementById('year-filters');

        let gridLinesContainer = document.getElementById('grid-lines');

        let isPlaying = false;
        let currentStep = 0;
        let speedFactor = 1;
        let lastTimestamp = null;
        let sliderIsActive = false;

        let domCache = [];
        let gridCache = new Map();
        let lastTickKey = '';

        // Сырые данные из CSV
        let rawDates = [];
        let rawCandidates = [];
        let availableYears = [];

        // Текущие (отфильтрованные) данные
        let dates = [];
        let candidates = [];

        // Геймификация: Заранее рассчитанные победители по месяцам
        let activeMonthlyWinners = [];
        let lastCompletedCount = 0;

        function getInitials(name) {
            return name.split(' ').map(n => n[0]).filter(Boolean).slice(0, 2).join('');
        }

        // Проверка: является ли дата концом месяца
        function isMonthEnd(dateStr, nextDateStr) {
            if (!nextDateStr) {
                const [d, m, y] = dateStr.split('.').map(Number);
                const lastDay = new Date(y, m, 0).getDate();
                return d === lastDay;
            }
            const currentParts = dateStr.split('.');
            const nextParts = nextDateStr.split('.');
            return currentParts[1] !== nextParts[1] || currentParts[2] !== nextParts[2];
        }

        // Загрузка данных по URL
        async function loadData() {
            try {
                const response = await fetch('data.csv');
                if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
                const csvText = await response.text();

                parseCSV(csvText);
                buildYearFilters();

                // Автовыбор текущего года
                const currentYear = new Date().getFullYear().toString();
                if (availableYears.includes(currentYear)) {
                    applyFilter(currentYear);
                } else if (availableYears.length > 0) {
                    applyFilter(availableYears[availableYears.length - 1]);
                } else {
                    applyFilter('all');
                }

            } catch (error) {
                console.error("Ошибка загрузки CSV:", error);
                textDateRange.textContent = "Ошибка загрузки файла data.csv. Убедитесь, что файл лежит рядом с index.html.";
            }
        }

        function parseCSV(text) {
            if (text.charCodeAt(0) === 0xFEFF) text = text.substring(1);
            const lines = text.trim().split('\n').map(l => l.split(','));
            const headers = lines[0];

            rawDates = headers.slice(3).map(d => d.trim());
            rawCandidates = [];

            const yearsSet = new Set(rawDates.map(d => d.split('.')[2]));
            availableYears = Array.from(yearsSet).sort();

            for (let i = 1; i < lines.length; i++) {
                const cols = lines[i];
                if (cols.length < 4) continue;
                rawCandidates.push({
                    name: cols[0].trim(),
                    avatar: cols[1].trim(),
                    dept: cols[2].trim(),
                    allValues: cols.slice(3).map(v => parseFloat(v) || 0)
                });
            }
        }

        function buildYearFilters() {
            yearFiltersContainer.innerHTML = '';

            const btnAll = document.createElement('button');
            btnAll.textContent = "За всё время";
            btnAll.className = "filter-btn px-3 py-1.5 rounded bg-slate-800/80 hover:bg-slate-700 transition shadow";
            btnAll.dataset.year = "all";
            btnAll.onclick = () => applyFilter('all');
            yearFiltersContainer.appendChild(btnAll);

            if (availableYears.length > 1) {
                availableYears.forEach(year => {
                    const btn = document.createElement('button');
                    btn.textContent = year;
                    btn.className = "filter-btn px-3 py-1.5 rounded bg-slate-800/80 hover:bg-slate-700 transition";
                    btn.dataset.year = year;
                    btn.onclick = () => applyFilter(year);
                    yearFiltersContainer.appendChild(btn);
                });
            }
        }

        function applyFilter(year) {
            isPlaying = false;
            updatePlayPauseState();
            currentStep = 0;
            lastCompletedCount = 0;

            document.querySelectorAll('.filter-btn').forEach(btn => {
                if (btn.dataset.year === year) {
                    btn.classList.replace('bg-slate-800/80', 'bg-slate-700');
                    btn.classList.add('shadow');
                } else {
                    btn.classList.replace('bg-slate-700', 'bg-slate-800/80');
                    btn.classList.remove('shadow');
                }
            });

            if (year === 'all') {
                dates = [...rawDates];
                candidates = rawCandidates.map(c => ({ ...c, values: [...c.allValues] }));
            } else {
                const startIndex = rawDates.findIndex(d => d.endsWith(year));
                const endIndex = rawDates.findLastIndex(d => d.endsWith(year));

                dates = rawDates.slice(startIndex, endIndex + 1);
                candidates = rawCandidates.map(c => {
                    const baseline = startIndex > 0 ? c.allValues[startIndex - 1] : 0;
                    return {
                        ...c,
                        values: c.allValues.slice(startIndex, endIndex + 1).map(v => Math.max(0, v - baseline))
                    };
                });
            }

            activeMonthlyWinners = [];
            let prevMonthEndIndex = -1;

            for (let i = 0; i < dates.length; i++) {
                if (isMonthEnd(dates[i], dates[i + 1])) {

                    const standings = candidates.map((c, index) => {
                        const startVal = prevMonthEndIndex !== -1 ? c.values[prevMonthEndIndex] : 0;
                        const endVal = c.values[i];
                        const monthProgress = Math.max(0, endVal - startVal);

                        return {
                            index,
                            val: monthProgress,
                            name: c.name
                        };
                    });

                    standings.sort((a, b) => b.val !== a.val ? b.val - a.val : a.name.localeCompare(b.name));

                    activeMonthlyWinners.push({
                        index: i,
                        monthYear: dates[i].split('.').slice(1).join('.'),
                        gold: standings[0] && standings[0].val > 0 ? standings[0].index : -1,
                        silver: standings[1] && standings[1].val > 0 ? standings[1].index : -1,
                        bronze: standings[2] && standings[2].val > 0 ? standings[2].index : -1
                    });

                    prevMonthEndIndex = i;
                }
            }

            initDOM();
            draw();
        }

        function initDOM() {
            chartContainer.innerHTML = '<div id="grid-lines" class="absolute left-[160px] md:left-[220px] right-[70px] top-0 bottom-0 pointer-events-none select-none z-0"></div>';
            gridLinesContainer = document.getElementById('grid-lines');
            gridCache.clear();
            domCache = [];
            lastTickKey = '';

            textDateRange.textContent = `Динамика результатов с ${dates[0]} по ${dates[dates.length - 1]}`;
            slider.disabled = false;
            slider.max = dates.length - 1;

            candidates.forEach((c, index) => {
                const initials = getInitials(c.name);
                const row = document.createElement('div');

                row.className = `bar-row absolute left-0 right-0 flex items-center z-10`;
                row.style.height = `${rowHeight}px`;
                row.style.transform = `translateY(1500px)`;
                row.style.opacity = '0';

                // ИСПРАВЛЕНО: gap и размер шрифта у .medals-container теперь берутся из MEDAL_CONFIG
                row.innerHTML = `
                    <div class="rank-display w-6 text-right font-mono font-black pr-2 select-none text-sm md:text-base"></div>
                    <div class="w-32 md:w-48 flex-shrink-0 flex flex-col justify-center pr-3 select-none">
                        <div class="name-label font-bold text-xs md:text-sm truncate transition-colors duration-300 text-white">${c.name}</div>
                        <div class="mt-0.5 flex items-center gap-1.5 overflow-visible">
                            <span class="text-[9px] uppercase tracking-wider bg-[#0C1424] px-1.5 py-0.5 rounded text-slate-400 font-semibold border border-slate-700/50">${c.dept}</span>
                            <div class="medals-container flex items-center ${MEDAL_CONFIG.gapBetween} ${MEDAL_CONFIG.emojiSize} overflow-visible hover:scale-110 transition duration-150"></div>
                        </div>
                    </div>
                    <div class="flex-1 relative h-10 bg-slate-800/30 rounded-md flex items-center mr-16">
                        <div class="bar-fill absolute left-0 top-0 bottom-0 rounded-l transition-colors duration-300 w-0"></div>
                        <div class="avatar-container absolute w-10 h-10 rounded-full bg-slate-800 flex items-center justify-center border-2 shadow-sm overflow-hidden z-20 transition-colors duration-300" style="left: 0;">
                            <img src="${c.avatar}" alt="${c.name}" onerror="this.classList.add('hidden'); this.nextElementSibling.classList.remove('hidden');" class="w-full h-full object-cover">
                            <div class="hidden text-sm font-black text-slate-300 uppercase">${initials}</div>
                        </div>
                        <div class="value-label absolute z-20 font-mono font-bold text-sm md:text-base select-none left-0">0</div>
                    </div>
                `;
                chartContainer.appendChild(row);

                domCache.push({
                    rowEl: row,
                    barFill: row.querySelector('.bar-fill'),
                    avatarContainer: row.querySelector('.avatar-container'),
                    rankDisplay: row.querySelector('.rank-display'),
                    valueLabel: row.querySelector('.value-label'),
                    nameLabel: row.querySelector('.name-label'),
                    medalsContainer: row.querySelector('.medals-container'),
                    lastRank: -1,
                    currentValue: 0
                });
            });

            const timelineLabels = document.getElementById('timeline-labels');
            let labelsHTML = '';
            const step = Math.ceil(dates.length / 8);
            for (let i = 0; i < dates.length; i += step) {
                const percentage = (i / (dates.length - 1)) * 100;
                if (percentage > 2 && percentage < 98) {
                    labelsHTML += `<span style="left: ${percentage}%; transform: translateX(-50%)" class="absolute text-[10px] text-slate-500 font-mono">${dates[i]}</span>`;
                }
            }
            labelsHTML += `<span style="left: 0%;" class="absolute text-[10px] text-slate-500 font-mono">${dates[0]}</span>`;
            labelsHTML += `<span style="left: 100%; transform: translateX(-100%)" class="absolute text-[10px] text-slate-500 font-mono">${dates[dates.length - 1]}</span>`;
            timelineLabels.innerHTML = labelsHTML;
        }

        function getNiceTicks(maxVal, maxTicks = 5) {
            if (maxVal <= 0) return [];
            const roughStep = maxVal / maxTicks;
            const mag = Math.pow(10, Math.floor(Math.log10(roughStep)));
            const norm = roughStep / mag;
            let step;
            if (norm < 1.5) step = 1; else if (norm < 3) step = 2; else if (norm < 7) step = 5; else step = 10;
            step *= mag;
            const ticks = [];
            const start = Math.floor(step / step) * step;
            for (let i = start; i <= maxVal; i += step) ticks.push(i);
            return ticks;
        }

        function updateDynamicGrid(maxVal) {
            const ticks = getNiceTicks(maxVal, 5);
            const tickKey = ticks.join(',');
            const isScaleChanged = tickKey !== lastTickKey;
            lastTickKey = tickKey;

            const activeVals = new Set(ticks);

            gridCache.forEach((el, val) => {
                const percentage = (val / maxVal) * 100;
                el.style.left = `${percentage}%`;

                if (isScaleChanged && !activeVals.has(val)) {
                    el.style.opacity = '0';
                }
                if (percentage < -5 || percentage > 150) {
                    el.remove();
                    gridCache.delete(val);
                }
            });

            if (!gridCache.has(0)) {
                const zeroEl = document.createElement('div');
                zeroEl.className = 'absolute top-0 bottom-0 border-r border-slate-700/30';
                zeroEl.style.left = '0%';
                zeroEl.innerHTML = `<span class="absolute top-[-20px] right-0 translate-x-1/2 text-[11px] font-bold text-slate-600 font-mono">0</span>`;
                gridLinesContainer.appendChild(zeroEl);
                gridCache.set(0, zeroEl);
            }

            if (!isScaleChanged) return;

            ticks.forEach(val => {
                if (!gridCache.has(val)) {
                    const el = document.createElement('div');
                    el.className = 'absolute top-0 bottom-0 border-r border-slate-700/30 transition-opacity duration-700';
                    el.style.opacity = '0';
                    el.innerHTML = `<span class="absolute top-[-20px] right-0 translate-x-1/2 text-[11px] font-bold text-slate-600 font-mono">${val}</span>`;
                    gridLinesContainer.appendChild(el);
                    gridCache.set(val, el);
                    void el.offsetWidth;
                    el.style.opacity = '1';
                    el.style.left = `${(val / maxVal) * 100}%`;
                } else {
                    gridCache.get(val).style.opacity = '1';
                }
            });
        }

        function applyRankDesign(els, rank) {
            els.barFill.className = "bar-fill absolute left-0 top-0 bottom-0 rounded-l transition-colors duration-300";
            els.avatarContainer.className = "avatar-container absolute w-10 h-10 rounded-full bg-slate-800 flex items-center justify-center border-2 overflow-hidden z-20 transition-colors duration-300";
            els.rankDisplay.className = "rank-display w-6 text-right font-mono font-black pr-2 select-none text-sm md:text-base";
            els.valueLabel.className = "value-label absolute z-20 font-mono font-bold text-sm md:text-base select-none";
            els.nameLabel.className = "name-label font-bold text-xs md:text-sm truncate transition-colors duration-300";

            if (rank === 0) {
                els.barFill.classList.add('bg-gradient-to-r', 'from-amber-600', 'to-amber-400', 'shadow-[0_0_15px_rgba(245,158,11,0.5)]');
                els.avatarContainer.classList.add('border-amber-400', 'shadow-[0_0_10px_rgba(245,158,11,0.4)]');
                els.rankDisplay.classList.add('text-amber-400', 'text-base', 'scale-110');
                els.valueLabel.classList.add('text-amber-400');
                els.nameLabel.classList.add('text-amber-400');
            } else if (rank === 1) {
                els.barFill.classList.add('bg-gradient-to-r', 'from-slate-500', 'to-slate-300', 'shadow-[0_0_12px_rgba(203,213,225,0.4)]');
                els.avatarContainer.classList.add('border-slate-300', 'shadow-[0_0_8px_rgba(203,213,225,0.4)]');
                els.rankDisplay.classList.add('text-slate-300');
                els.valueLabel.classList.add('text-slate-200');
                els.nameLabel.classList.add('text-slate-300');
            } else if (rank === 2) {
                els.barFill.classList.add('bg-gradient-to-r', 'from-orange-700', 'to-orange-500', 'shadow-[0_0_12px_rgba(249,115,22,0.4)]');
                els.avatarContainer.classList.add('border-orange-500', 'shadow-[0_0_8px_rgba(249,115,22,0.4)]');
                els.rankDisplay.classList.add('text-orange-400');
                els.valueLabel.classList.add('text-orange-400');
                els.nameLabel.classList.add('text-orange-400');
            } else {
                els.barFill.classList.add('bg-slate-700/60', 'border-r', 'border-slate-600/50');
                els.avatarContainer.classList.add('border-slate-600/50');
                els.rankDisplay.classList.add('text-slate-600');
                els.valueLabel.classList.add('text-slate-500');
                els.nameLabel.classList.add('text-white');
            }
        }

        // Запуск импульсной анимации на медали у победителей
        function triggerMedalPop(candidateIndex) {
            if (candidateIndex === -1) return;
            const els = domCache[candidateIndex];
            if (els && els.medalsContainer) {
                els.medalsContainer.classList.remove('animate-pop');
                void els.medalsContainer.offsetWidth; // Триггер сброса анимации
                els.medalsContainer.classList.add('animate-pop');
            }
        }

        // Вспомогательная функция для генерации HTML-кода медали на основе MEDAL_CONFIG
        function generateSingleMedalHTML(medalEmoji, value, title, colorClass) {
            const formattedValue = MEDAL_CONFIG.useXFormat ? `x${value}` : value;

            const emojiSpan = `<span>${medalEmoji}</span>`;
            const digitSpan = `<span class="${MEDAL_CONFIG.digitSize} ${colorClass} font-mono">${formattedValue}</span>`;

            // Настройка порядка: медаль сначала или число сначала
            const content = MEDAL_CONFIG.order === "emoji-first"
                ? emojiSpan + digitSpan
                : digitSpan + emojiSpan;

            return `<span class="flex items-center ${MEDAL_CONFIG.gapInside}" title="${title}">${content}</span>`;
        }

        function draw() {
            if (!dates.length) return;
            const step = currentStep;
            const idx = Math.floor(step);
            const idx2 = Math.min(idx + 1, dates.length - 1);
            const t = step - idx;

            textCurrentDate.textContent = dates[idx];
            textWatermarkDate.textContent = dates[idx];
            textDayCounter.textContent = `День ${idx + 1} / ${dates.length}`;

            for (let i = 0; i < candidates.length; i++) {
                const val1 = candidates[i].values[idx];
                const val2 = candidates[i].values[idx2];
                domCache[i].currentValue = val1 + (val2 - val1) * t;
            }

            const totalSum = domCache.reduce((sum, item) => sum + item.currentValue, 0);
            textWatermarkTotal.textContent = Math.round(totalSum).toLocaleString('ru-RU');

            const maxVal = domCache.reduce((m, item) => item.currentValue > m ? item.currentValue : m, 1);
            updateDynamicGrid(maxVal);

            const indices = Array.from(candidates.keys());
            indices.sort((a, b) => {
                const valA = domCache[a].currentValue;
                const valB = domCache[b].currentValue;
                if (valB !== valA) return valB - valA;
                return candidates[a].name.localeCompare(candidates[b].name);
            });

            const ranks = new Array(candidates.length);
            for (let i = 0; i < indices.length; i++) ranks[indices[i]] = i;

            // --- РАСЧЕТ И ОТОБРАЖЕНИЕ МЕДАЛЕЙ ---
            const medalCounts = candidates.map(() => ({ gold: 0, silver: 0, bronze: 0 }));
            let completedMonthsCount = 0;

            for (const item of activeMonthlyWinners) {
                if (item.index <= idx) {
                    completedMonthsCount++;
                    if (item.gold !== -1) medalCounts[item.gold].gold++;
                    if (item.silver !== -1) medalCounts[item.silver].silver++;
                    if (item.bronze !== -1) medalCounts[item.bronze].bronze++;
                }
            }

            // Тач-эффект: триггер анимации при переходе через границу месяца
            if (completedMonthsCount !== lastCompletedCount) {
                if (isPlaying && completedMonthsCount > lastCompletedCount) {
                    const latestMonth = activeMonthlyWinners[completedMonthsCount - 1];
                    if (latestMonth) {
                        triggerMedalPop(latestMonth.gold);
                        triggerMedalPop(latestMonth.silver);
                        triggerMedalPop(latestMonth.bronze);
                    }
                }
                lastCompletedCount = completedMonthsCount;
            }

            const maxBarWidth = 100;

            for (let i = 0; i < candidates.length; i++) {
                const rank = ranks[i];
                const els = domCache[i];

                // Логика ТОП-10
                if (rank < TOP_LIMIT) {
                    els.rowEl.style.transform = `translateY(${rank * (rowHeight + gap)}px)`;
                    els.rowEl.style.opacity = '1';
                } else {
                    els.rowEl.style.transform = `translateY(1500px)`;
                    els.rowEl.style.opacity = '0';
                }

                const val = els.currentValue;
                const percentage = (val / maxVal) * maxBarWidth;

                els.valueLabel.textContent = Math.round(val);
                els.rankDisplay.textContent = rank + 1;

                els.barFill.style.width = `${percentage}%`;
                els.valueLabel.style.left = `calc(${percentage}% + 10px)`;
                els.avatarContainer.style.left = `calc(max(0px, ${percentage}% - 40px))`;

                // ИСПРАВЛЕНО: Динамический рендер медалей на основе MEDAL_CONFIG
                const count = medalCounts[i];
                let medalsHTML = '';
                if (count.gold > 0) medalsHTML += generateSingleMedalHTML('🥇', count.gold, 'Золотых медалей', 'text-amber-400');
                if (count.silver > 0) medalsHTML += generateSingleMedalHTML('🥈', count.silver, 'Серебряных медалей', 'text-slate-300');
                if (count.bronze > 0) medalsHTML += generateSingleMedalHTML('🥉', count.bronze, 'Бронзовых медалей', 'text-orange-400');

                els.medalsContainer.innerHTML = medalsHTML;

                if (els.lastRank !== rank) {
                    applyRankDesign(els, rank);
                    els.lastRank = rank;
                }
            }

            if (!sliderIsActive) slider.value = step;
        }

        function animate(timestamp) {
            if (!isPlaying) { lastTimestamp = null; return; }
            if (!lastTimestamp) lastTimestamp = timestamp;
            const dt = timestamp - lastTimestamp;
            lastTimestamp = timestamp;

            currentStep += (dt / 1000) * speedFactor;

            if (currentStep >= dates.length - 1) {
                currentStep = dates.length - 1;
                isPlaying = false;
                updatePlayPauseState();
                draw();
                return;
            }
            draw();
            requestAnimationFrame(animate);
        }

        function updatePlayPauseState() {
            if (isPlaying) {
                iconPlay.classList.add('hidden');
                iconPause.classList.remove('hidden');
            } else {
                iconPlay.classList.remove('hidden');
                iconPause.classList.add('hidden');
            }
        }

        btnPlay.addEventListener('click', () => {
            if (currentStep >= dates.length - 1) currentStep = 0;
            isPlaying = !isPlaying;
            updatePlayPauseState();
            if (isPlaying) requestAnimationFrame(animate);
        });

        btnReset.addEventListener('click', () => {
            isPlaying = false;
            currentStep = 0;
            lastCompletedCount = 0; // Сброс анимаций
            updatePlayPauseState();
            draw();
        });

        slider.addEventListener('input', () => {
            sliderIsActive = true;
            isPlaying = false;
            updatePlayPauseState();
            currentStep = parseFloat(slider.value);
            draw();
        });

        slider.addEventListener('change', () => sliderIsActive = false);

        speedButtons.forEach(button => {
            button.addEventListener('click', () => {
                speedButtons.forEach(btn => btn.classList.remove('bg-slate-700', 'text-white', 'shadow'));
                button.classList.add('bg-slate-700', 'text-white', 'shadow');
                speedFactor = parseFloat(button.getAttribute('data-speed'));
            });
        });

        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space') { e.preventDefault(); btnPlay.click(); }
            if (e.code === 'ArrowLeft') { currentStep = Math.max(0, currentStep - 1); slider.value = currentStep; draw(); }
            if (e.code === 'ArrowRight') { currentStep = Math.min(dates.length - 1, currentStep + 1); slider.value = currentStep; draw(); }
        });

        loadData();
    </script>
</body>

</html>
